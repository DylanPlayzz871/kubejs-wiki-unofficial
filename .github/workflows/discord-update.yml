name: Discord Wiki Updates

on:
  push:
    branches: [ main, master ]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"username\": \"KubeJS Wiki Bot\", \"content\": \"🚀 **Wiki Has Been Updated!**\\n\\n**Changes:**\\n\`\`\`\\n${{ github.event.head_commit.message }}\`\`\`\\n\\n🔗 [View Live Site](https://DylanPlayzz871.github.io/kubejs-wiki-unofficial/)\\n👤 Updated by: @${{ github.actor }}\"}" \
               ${{ secrets.DISCORD_WEBHOOK }}