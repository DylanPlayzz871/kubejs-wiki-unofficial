name: Discord Wiki Updates

on:
  push:
    branches: [ main, master ]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "username": "KubeJS Wiki Bot",
                 "embeds": [{
                   "title": "🚀 Wiki Has Been Updated!",
                   "description": "```'${{ github.event.head_commit.message }}'```",
                   "color": 7506394,
                   "url": "https://DylanPlayzz871.github.io/kubejs-wiki-unofficial/",
                   "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
                   "footer": {
                     "text": "Updated by @${{ github.actor }}"
                   }
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK }}