name: Discord Wiki Updates

on:
  push:
    branches: [ main, master ]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        run: |
          MESSAGE="${{ github.event.head_commit.message }}"

          curl -H "Content-Type: application/json" \
               -X POST \
               --data "$(printf '{"username":"KubeJS Wiki Bot","content":"🚀 **Wiki Has Been Updated!**\n\n**Changes:**\n```%s```\n\n🔗 https://DylanPlayzz871.github.io/kubejs-wiki-unofficial/\n👤 Updated by: @${{ github.actor }}"}'
               "$MESSAGE")"\
               ${{ secrets.DISCORD_WEBHOOK }}
        shell: bash