name: Discord Wiki Updates

on:
  push:
    branches: [ main, master ]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Notification
        run: |
          echo "Sending to Discord..."
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"🚀 **Test Message** from GitHub Actions\\nCommit: ${{ github.event.head_commit.message }}\"}" \
               ${{ secrets.DISCORD_WEBHOOK }}
        shell: bash